name: CI (Integração Contínua)
on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

jobs:
  build:
    name: Validar Código e Gerar Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Instalar Dependências
        run: npm install --frozen-lockfile

      - name: Verificar Estilo (Lint)
        run: npm run lint

      - name: Checagem de Tipagem (Typecheck)
        run: npm run typecheck

      - name: Rodar Testes de Unidade
        run: npm run test:coverage

      - name: Gerar Build Final
        run: npm run build

      - name: Criar cypress.env.json
        run: |
          echo '{
            "user_name": "${{ secrets.CYPRESS_user_email }}",
            "user_password": "${{ secrets.CYPRESS_user_senha }}"
          }' > cypress.env.json
